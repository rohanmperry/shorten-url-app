<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link not found</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231D9E75'/><path d='M10 18L16 12M11 9H8a5 5 0 000 10h2M21 23h3a5 5 0 000-10h-2' stroke='white' stroke-width='2.5' stroke-linecap='round'/></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal-600: #0F6E56;
      --teal-500: #1D9E75;
      --gray-50:  #F8F9FA;
      --gray-200: #E0DED6;
      --gray-400: #9A9890;
      --gray-600: #5F5E5A;
      --gray-900: #1A1A18;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 0.5px solid var(--gray-200);
      background: #fff;
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: var(--teal-500);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-icon svg { width: 18px; height: 18px; }

    .brand-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--gray-900);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .code {
      font-size: 72px;
      font-weight: 500;
      color: var(--teal-500);
      line-height: 1;
      margin-bottom: 1rem;
    }

    .title {
      font-size: 22px;
      font-weight: 500;
      color: var(--gray-900);
      margin-bottom: 0.75rem;
    }

    .subtitle {
      font-size: 15px;
      color: var(--gray-600);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      height: 42px;
      padding: 0 24px;
      background: var(--teal-500);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      line-height: 42px;
      transition: background 0.15s;
    }

    .btn:hover { background: var(--teal-600); }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 12px;
      color: var(--gray-400);
      border-top: 0.5px solid var(--gray-200);
    }
  </style>
</head>
<body>

<header>
  <a class="brand" href="/">
    <div class="brand-icon">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 12L12 8M9 5H6a3 3 0 000 6h1M11 15h3a3 3 0 000-6h-1"
          stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="brand-name" id="brand-name"></span>
  </a>
</header>

<main>
  <div class="container">
    <div class="code">404</div>
    <h1 class="title">Link not found</h1>
    <p class="subtitle">
      This short link doesn't exist or may have expired.<br/>
      Double check the URL or create a new short link below.
    </p>
    <a class="btn" href="/">Shorten a new URL</a>
  </div>
</main>

<footer id="footer"></footer>

<script>
  const hostname = window.location.hostname;
  document.getElementById('brand-name').textContent = hostname;
  document.title = `Link not found — ${hostname}`;
  document.getElementById('footer').textContent =
    `${hostname} — Built with AWS Lambda, API Gateway, DynamoDB & CloudFront`;
</script>

</body>
</html>
