on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string
      aws-region:
        required: false
        type: string
        default: 'us-east-1'
      tf-version:
        required: false
        type: string
        default: '1.14.8'
      apply:
        required: false
        type: boolean
        default: false
    secrets:
      AWS_GITHUB_ROLE_ARN:
        required: true

env:
  AWS_DEFAULT_REGION: ${{ inputs.aws-region || 'us-east-1' }}
  TF_VERSION: ${{ inputs.tf-version || '1.14.8' }}
  TF_IN_AUTOMATION: true
  # Set TF Debug level accordingly: ERROR, WARN, INFO,DEBUG, TRACE or null ('')
  #  to turn it off, oe comment the line below.
  TF_LOG: ''

jobs:
  run-change:
    name: Run Change
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: make install-dev

      - name: Run Tests
        run: make test

      - name: Build Images for Testing
        if: ${{ !inputs.apply }}
        run: make build-only

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Build Images for Push
        if: ${{ inputs.apply }}
        run: make build

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: TF Init and Validate
        run: |
          make init
          make validate

      - name: TF Plan
        if: ${{ !inputs.apply }}
        run: make plan
        timeout-minutes: 2

      - name: TF Apply
        if: ${{ inputs.apply }}
        run: make apply
        timeout-minutes: 5

      - name: Image Push
        if: ${{ inputs.apply }}
        run: make push
